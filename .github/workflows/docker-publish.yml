name: Docker Build & Publish

on:
  # Se dispara cuando Update SHA256SUMS termina (cambios en scripts bash)
  workflow_run:
    workflows: ["Update SHA256SUMS"]
    branches: [main]
    types: [completed]

  # Se dispara directamente cuando cambia el propio Dockerfile o entrypoint
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push ghcr.io/0netx/url-watchdog
    runs-on: ubuntu-latest

    # Si viene de workflow_run: solo continuar si el workflow padre tuvo éxito
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run: checkout main para incluir el commit de SHA256SUMS que
          # el bot genera DESPUÉS del push original. Si usáramos head_sha
          # obtendríamos el commit que disparó el workflow padre, sin SHA256SUMS actualizado.
          # Push directo (Dockerfile, tags): github.sha ya es el commit correcto.
          ref: ${{ github.event_name == 'workflow_run' && 'refs/heads/main' || github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/0netx/url-watchdog
          tags: |
            # latest siempre que se sube a main
            type=raw,value=latest,enable={{is_default_branch}}
            # SHA corto del commit (ej. sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Tags semver desde git tags v* (ej. v2.4.0 → 2.4.0 y 2.4)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache en GitHub Actions para builds incrementales
          cache-from: type=gha
          cache-to: type=gha,mode=max
