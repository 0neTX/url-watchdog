name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck -S warning \
            url-watchdog-common.sh \
            url-watchdog.sh \
            telegram-bot.sh \
            url-watchdog-report.sh \
            install.sh

  syntax:
    name: Bash syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check syntax
        run: |
          for f in *.sh; do
            echo "Checking $f..."
            bash -n "$f" || exit 1
          done
          echo "All scripts passed syntax check."
