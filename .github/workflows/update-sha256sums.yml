name: Update SHA256SUMS

on:
  push:
    branches: [ main ]
    paths:
      - 'url-watchdog-common.sh'
      - 'url-watchdog.sh'
      - 'telegram-bot.sh'
      - 'url-watchdog-report.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'url-watchdog-common.sh'
      - 'url-watchdog.sh'
      - 'telegram-bot.sh'
      - 'url-watchdog-report.sh'

permissions:
  contents: write

jobs:
  update-sha256sums:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate SHA256SUMS
        run: |
          sha256sum \
            url-watchdog-common.sh \
            url-watchdog.sh \
            telegram-bot.sh \
            url-watchdog-report.sh \
          > SHA256SUMS

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet SHA256SUMS || {
            git add SHA256SUMS
            git commit -m "chore: update SHA256SUMS [skip ci]"
            git push
          }
