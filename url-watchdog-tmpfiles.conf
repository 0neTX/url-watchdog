# /etc/tmpfiles.d/url-watchdog.conf
# ============================================================
#  Crea /run/url-watchdog en cada arranque antes de que
#  cualquier servicio del watchdog intente escribir en él.
#  systemd-tmpfiles --create lo ejecuta automáticamente en boot.
#
#  Formato: tipo  path                  modo  usuario  grupo  tiempo
# ============================================================
d  /run/url-watchdog  0700  root  root  -
